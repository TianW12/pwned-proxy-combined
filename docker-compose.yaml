services:
  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file:
      - ./app/.env
    depends_on:
      - db
    ports:
      - "8000:8000"
    networks:
      - private   # talk to Postgres
      - public    # talk to frontend / Internet
    restart: unless-stopped
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      python scripts/create_admin.py &&
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --access-logfile -
      --log-level info
      "

  db:
    image: postgres:14-alpine
    env_file:
      - ./app/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private   # only backend can see this
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  # Isolated; unreachable from the host or other networks
  private:
    internal: true
  # Ordinary bridge; containers on it can reach one another and the Internet
  public:
